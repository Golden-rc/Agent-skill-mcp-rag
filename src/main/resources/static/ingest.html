<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RAG Ingest</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/common.css">
</head>
<body>
<main class="wrap">
  <section class="hero">
    <h1>RAG Ingest</h1>
    <p>支持文本写入与文件文档写入（txt/pdf/doc/docx/md 等）。</p>
  </section>

  <nav class="nav">
    <a href="/">首页</a>
    <a href="/chat.html">Chat</a>
    <a href="/rag.html">RAG 管理</a>
    <a href="/sessions.html">Session 管理</a>
  </nav>

  <section class="grid">
    <article class="card">
      <h2>文本写入</h2>
      <div class="row">
        <label for="textSource">Source</label>
        <input id="textSource" value="internship-guide">
      </div>
      <div class="row">
        <label for="textContent">Text</label>
        <textarea id="textContent">AI工程师实习重点包括Agent架构、RAG系统搭建、工具链封装、记忆管理与安全合规优化。</textarea>
      </div>
      <button id="ingestTextBtn">写入文本</button>
      <div id="textStatus" class="status"></div>
      <div id="textOutput" class="output">等待写入...</div>
    </article>

    <article class="card">
      <h2>文件写入（支持批量）</h2>
      <div class="row">
        <label for="sourcePrefix">Source 前缀（可选）</label>
        <input id="sourcePrefix" placeholder="例如：rag-docs/2026-03">
      </div>
      <div class="row">
        <label for="fileInput">File</label>
        <input id="fileInput" type="file" multiple accept=".txt,.md,.pdf,.doc,.docx,.rtf,.html,.csv">
      </div>
      <div class="row" style="display:flex; align-items:center; gap:8px;">
        <input id="continueOnError" type="checkbox" checked>
        <label for="continueOnError" style="margin:0;">遇到单个文件错误继续处理其余文件</label>
      </div>
      <button id="ingestFilesBtn">批量上传并写入</button>
      <div id="fileStatus" class="status"></div>
      <div id="fileOutput" class="output">等待上传...</div>
    </article>
  </section>
</main>

<script src="/common.js"></script>
<script>
  const ingestTextBtn = document.getElementById("ingestTextBtn");
  const ingestFilesBtn = document.getElementById("ingestFilesBtn");

  const textStatus = document.getElementById("textStatus");
  const textOutput = document.getElementById("textOutput");
  const fileStatus = document.getElementById("fileStatus");
  const fileOutput = document.getElementById("fileOutput");

  ingestTextBtn.addEventListener("click", async () => {
    try {
      setStatus(textStatus, "写入中...");
      const payload = {
        source: document.getElementById("textSource").value.trim(),
        text: document.getElementById("textContent").value.trim()
      };
      const data = await api("/rag/ingest", { method: "POST", body: JSON.stringify(payload) });
      setStatus(textStatus, "写入成功", "ok");
      textOutput.textContent = JSON.stringify(data, null, 2);
    } catch (e) {
      setStatus(textStatus, e.message, "error");
    }
  });

  ingestFilesBtn.addEventListener("click", async () => {
    try {
      const files = Array.from(document.getElementById("fileInput").files || []);
      if (files.length === 0) {
        setStatus(fileStatus, "请先选择至少一个文件", "error");
        return;
      }

      setStatus(fileStatus, `上传中（${files.length} 个文件）...`);
      const formData = new FormData();
      files.forEach((file) => formData.append("files", file));

      const sourcePrefix = document.getElementById("sourcePrefix").value.trim();
      if (sourcePrefix) {
        formData.append("sourcePrefix", sourcePrefix);
      }
      const continueOnError = document.getElementById("continueOnError").checked;
      formData.append("continueOnError", String(continueOnError));

      const res = await fetch("/rag/ingest/files", {
        method: "POST",
        body: formData
      });
      const data = await res.json().catch(() => ({}));
      if (!res.ok) throw new Error(data.error || `HTTP ${res.status}`);

      setStatus(fileStatus, `完成：成功 ${data.success || 0}，失败 ${data.failed || 0}，chunks ${data.totalChunks || 0}`, "ok");
      fileOutput.textContent = JSON.stringify(data, null, 2);
    } catch (e) {
      setStatus(fileStatus, e.message, "error");
    }
  });
</script>
</body>
</html>
