<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agent Hub Console</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-0: #0c1422;
      --bg-1: #13233a;
      --card: rgba(15, 22, 35, 0.86);
      --line: rgba(255, 255, 255, 0.12);
      --text: #e9eef6;
      --muted: #a6b4cb;
      --accent: #36d1b7;
      --accent-2: #ffb86a;
      --danger: #ff6d7d;
      --ok: #8de17b;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      color: var(--text);
      font-family: "Noto Sans SC", sans-serif;
      background:
        radial-gradient(900px 500px at 15% -10%, rgba(54, 209, 183, 0.2), transparent),
        radial-gradient(800px 420px at 100% 0%, rgba(255, 184, 106, 0.17), transparent),
        linear-gradient(140deg, var(--bg-0), var(--bg-1));
      min-height: 100vh;
      padding: 26px 16px;
    }

    .wrap { max-width: 1200px; margin: 0 auto; }
    .hero { margin-bottom: 16px; }
    .hero h1 { margin: 0; font-size: clamp(1.4rem, 4vw, 2.1rem); font-family: "Space Grotesk", sans-serif; }
    .hero p { margin: 6px 0 0; color: var(--muted); font-size: .95rem; }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 14px;
      backdrop-filter: blur(8px);
      box-shadow: 0 12px 36px rgba(0, 0, 0, .25);
    }

    .wide { grid-column: 1 / -1; }
    .card h2 { margin: 0 0 10px; font-family: "Space Grotesk", sans-serif; font-size: 1.04rem; }
    .row { display: grid; gap: 8px; margin-bottom: 10px; }
    .inline { grid-template-columns: 1fr 1fr; gap: 8px; }
    .inline-3 { grid-template-columns: 1fr 1fr 1fr; gap: 8px; }

    label { font-size: .84rem; color: var(--muted); }

    input, select, textarea, button {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 9px 10px;
      font: inherit;
      color: var(--text);
      background: rgba(8, 13, 22, 0.7);
    }

    textarea { min-height: 100px; resize: vertical; }

    button {
      border: none;
      background: linear-gradient(100deg, var(--accent), var(--accent-2));
      color: #10202a;
      font-weight: 700;
      cursor: pointer;
    }

    button.secondary {
      background: rgba(255, 255, 255, 0.09);
      color: var(--text);
      border: 1px solid var(--line);
    }

    button.danger { background: linear-gradient(100deg, #f07887, #ff6d7d); color: white; }

    .status { min-height: 18px; font-size: .86rem; color: var(--muted); margin-top: 6px; }
    .status.ok { color: var(--ok); }
    .status.error { color: var(--danger); }

    .output {
      margin-top: 10px;
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 10px;
      background: rgba(7, 11, 19, 0.72);
      min-height: 120px;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
      font-size: .91rem;
    }

    .kpi { margin-top: 8px; display: flex; gap: 8px; flex-wrap: wrap; }
    .tag { font-size: .76rem; border: 1px solid var(--line); border-radius: 99px; padding: 4px 8px; color: #d3dff1; }

    table { width: 100%; border-collapse: collapse; margin-top: 8px; }
    th, td { border-bottom: 1px solid var(--line); padding: 8px 6px; font-size: .85rem; text-align: left; vertical-align: top; }
    th { color: var(--muted); font-weight: 500; }
    .actions { display: flex; gap: 6px; }
    .actions button { padding: 6px 8px; font-size: .78rem; }
    .small { font-size: .78rem; color: var(--muted); }

    @media (max-width: 980px) {
      .grid { grid-template-columns: 1fr; }
      .inline, .inline-3 { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
<main class="wrap">
  <!-- 顶部简介 -->
  <section class="hero">
    <h1>Agent Hub Operations Console</h1>
    <p>支持聊天、知识库管理（RAG Chunk）、会话管理（Redis Session）。</p>
  </section>

  <section class="grid">
    <!-- RAG 写入面板 -->
    <article class="card">
      <h2>RAG Ingest</h2>
      <div class="row">
        <label for="source">Source</label>
        <input id="source" value="internship-guide">
      </div>
      <div class="row">
        <label for="ragText">Text</label>
        <textarea id="ragText">AI工程师实习重点包括Agent架构、RAG系统搭建、工具链封装、记忆管理与安全合规优化。</textarea>
      </div>
      <button id="ingestBtn">写入知识库</button>
      <div id="ingestStatus" class="status"></div>
      <div id="ingestOutput" class="output">等待写入...</div>
    </article>

    <!-- 聊天面板 -->
    <article class="card">
      <h2>Chat</h2>
      <div class="row inline">
        <div>
          <label for="sessionId">Session ID</label>
          <input id="sessionId" value="demo-ui-1">
        </div>
        <div>
          <label for="provider">Provider</label>
          <select id="provider">
            <option value="auto">auto</option>
            <option value="openai">openai</option>
            <option value="ollama">ollama</option>
          </select>
        </div>
      </div>
      <div class="row">
        <label for="message">Message</label>
        <textarea id="message">请基于知识库给我一个实习项目分周计划，并列出待办</textarea>
      </div>
      <button id="chatBtn">发送消息</button>
      <div id="chatStatus" class="status"></div>
      <div id="chatKpi" class="kpi"></div>
      <div id="chatOutput" class="output">等待对话...</div>
    </article>

    <!-- RAG 后台管理面板 -->
    <article class="card wide">
      <h2>RAG 数据管理</h2>
      <div class="row inline-3">
        <div>
          <label for="ragSourceFilter">Source Filter</label>
          <input id="ragSourceFilter" placeholder="留空=全部">
        </div>
        <div>
          <label for="ragLimit">Limit</label>
          <input id="ragLimit" type="number" value="50" min="1" max="200">
        </div>
        <div style="display:flex; align-items:end; gap:8px;">
          <button id="refreshRagBtn" class="secondary">刷新列表</button>
        </div>
      </div>
      <div id="ragManageStatus" class="status"></div>
      <div class="small">可修改 `source` 和 `content`，保存时会自动重建 embedding。</div>
      <table>
        <thead>
        <tr>
          <th>ID</th>
          <th>Source</th>
          <th>Content</th>
          <th>Created</th>
          <th>Actions</th>
        </tr>
        </thead>
        <tbody id="ragRows"></tbody>
      </table>
    </article>

    <!-- Session 后台管理面板 -->
    <article class="card wide">
      <h2>Session 管理</h2>
      <div class="row inline-3">
        <div>
          <label for="sessionPick">Session</label>
          <select id="sessionPick"></select>
        </div>
        <div style="display:flex; align-items:end; gap:8px;">
          <button id="refreshSessionBtn" class="secondary">刷新会话</button>
        </div>
        <div style="display:flex; align-items:end; gap:8px;">
          <button id="clearSessionBtn" class="danger">清空当前会话</button>
        </div>
      </div>
      <div id="sessionStatus" class="status"></div>
      <table>
        <thead>
        <tr>
          <th>Session ID</th>
          <th>Message Count</th>
          <th>TTL(s)</th>
        </tr>
        </thead>
        <tbody id="sessionRows"></tbody>
      </table>
      <div id="sessionHistory" class="output">选择会话后展示历史消息...</div>
    </article>
  </section>
</main>

<script>
  // ---- 基础 DOM 引用 ----
  const ingestBtn = document.getElementById("ingestBtn");
  const chatBtn = document.getElementById("chatBtn");
  const refreshRagBtn = document.getElementById("refreshRagBtn");
  const refreshSessionBtn = document.getElementById("refreshSessionBtn");
  const clearSessionBtn = document.getElementById("clearSessionBtn");
  const sessionPick = document.getElementById("sessionPick");

  const ingestStatus = document.getElementById("ingestStatus");
  const ingestOutput = document.getElementById("ingestOutput");
  const chatStatus = document.getElementById("chatStatus");
  const chatOutput = document.getElementById("chatOutput");
  const chatKpi = document.getElementById("chatKpi");
  const ragManageStatus = document.getElementById("ragManageStatus");
  const ragRows = document.getElementById("ragRows");
  const sessionStatus = document.getElementById("sessionStatus");
  const sessionRows = document.getElementById("sessionRows");
  const sessionHistory = document.getElementById("sessionHistory");

  // ---- 通用工具函数 ----
  function setStatus(el, text, type = "") {
    el.textContent = text;
    el.classList.remove("ok", "error");
    if (type) el.classList.add(type);
  }

  function esc(text) {
    return (text || "").replace(/[&<>\"']/g, (m) => ({
      "&": "&amp;",
      "<": "&lt;",
      ">": "&gt;",
      "\"": "&quot;",
      "'": "&#39;"
    }[m]));
  }

  // ---- 统一 API 调用封装 ----
  async function api(url, options = {}) {
    const res = await fetch(url, {
      headers: { "Content-Type": "application/json", ...(options.headers || {}) },
      ...options
    });
    const data = await res.json().catch(() => ({}));
    if (!res.ok) throw new Error(data.error || `HTTP ${res.status}`);
    return data;
  }

  // ---- RAG 写入 ----
  ingestBtn.addEventListener("click", async () => {
    try {
      setStatus(ingestStatus, "写入中...");
      const payload = {
        source: document.getElementById("source").value.trim(),
        text: document.getElementById("ragText").value.trim()
      };
      const data = await api("/rag/ingest", { method: "POST", body: JSON.stringify(payload) });
      setStatus(ingestStatus, "写入成功", "ok");
      ingestOutput.textContent = JSON.stringify(data, null, 2);
      await loadRagChunks();
    } catch (e) {
      setStatus(ingestStatus, e.message, "error");
    }
  });

  // ---- 聊天调用 ----
  chatBtn.addEventListener("click", async () => {
    try {
      setStatus(chatStatus, "请求中...");
      chatOutput.textContent = "";
      chatKpi.innerHTML = "";
      const payload = {
        sessionId: document.getElementById("sessionId").value.trim(),
        provider: document.getElementById("provider").value,
        message: document.getElementById("message").value.trim()
      };
      const data = await api("/chat", { method: "POST", body: JSON.stringify(payload) });
      chatKpi.innerHTML =
        `<span class="tag">provider: ${esc(data.providerUsed || "-")}</span>` +
        `<span class="tag">tools: ${esc((data.toolCalls || []).join(", ") || "none")}</span>` +
        `<span class="tag">citations: ${(data.citations || []).length}</span>`;

      let out = data.answer || "";
      if ((data.citations || []).length > 0) {
        out += "\n\n---\n引用:\n";
        (data.citations || []).forEach((c, idx) => {
          out += `${idx + 1}. [${c.source}] score=${(c.score || 0).toFixed(4)}\n${c.content}\n`;
        });
      }
      chatOutput.textContent = out;
      setStatus(chatStatus, "请求成功", "ok");
      await loadSessions();
    } catch (e) {
      setStatus(chatStatus, e.message, "error");
      chatOutput.textContent = "请求失败，请检查 API Key / 服务状态。";
    }
  });

  // ---- RAG 管理（查/改/删） ----
  async function loadRagChunks() {
    try {
      setStatus(ragManageStatus, "加载中...");
      const source = document.getElementById("ragSourceFilter").value.trim();
      const limit = Number(document.getElementById("ragLimit").value || 50);
      const q = new URLSearchParams();
      if (source) q.set("source", source);
      q.set("limit", String(limit));
      const rows = await api(`/admin/rag/chunks?${q.toString()}`);

      ragRows.innerHTML = rows.map((r) => `
        <tr>
          <td>${r.id}</td>
          <td><input id="src-${r.id}" value="${esc(r.source)}"></td>
          <td><textarea id="content-${r.id}" style="min-height:68px;">${esc(r.content)}</textarea></td>
          <td>${esc(r.createdAt)}</td>
          <td>
            <div class="actions">
              <button class="secondary" onclick="saveChunk(${r.id})">保存</button>
              <button class="danger" onclick="deleteChunk(${r.id})">删除</button>
            </div>
          </td>
        </tr>
      `).join("");

      setStatus(ragManageStatus, `已加载 ${rows.length} 条`, "ok");
    } catch (e) {
      setStatus(ragManageStatus, e.message, "error");
    }
  }

  window.saveChunk = async (id) => {
    try {
      const payload = {
        source: document.getElementById(`src-${id}`).value.trim(),
        content: document.getElementById(`content-${id}`).value.trim()
      };
      await api(`/admin/rag/chunks/${id}`, { method: "PUT", body: JSON.stringify(payload) });
      setStatus(ragManageStatus, `Chunk ${id} 已更新`, "ok");
      await loadRagChunks();
    } catch (e) {
      setStatus(ragManageStatus, e.message, "error");
    }
  };

  window.deleteChunk = async (id) => {
    if (!confirm(`确认删除 chunk ${id} ?`)) return;
    try {
      await api(`/admin/rag/chunks/${id}`, { method: "DELETE" });
      setStatus(ragManageStatus, `Chunk ${id} 已删除`, "ok");
      await loadRagChunks();
    } catch (e) {
      setStatus(ragManageStatus, e.message, "error");
    }
  };

  // ---- Session 管理 ----
  async function loadSessions() {
    try {
      setStatus(sessionStatus, "加载会话中...");
      const sessions = await api("/admin/sessions");
      sessionRows.innerHTML = sessions.map((s) => `
        <tr>
          <td>${esc(s.sessionId)}</td>
          <td>${s.messageCount}</td>
          <td>${s.ttlSeconds}</td>
        </tr>
      `).join("");

      const current = sessionPick.value;
      sessionPick.innerHTML = sessions.map((s) => `<option value="${esc(s.sessionId)}">${esc(s.sessionId)}</option>`).join("");
      if (current && sessions.some((s) => s.sessionId === current)) {
        sessionPick.value = current;
      }

      if (sessionPick.value) {
        await loadSessionHistory(sessionPick.value);
      } else {
        sessionHistory.textContent = "暂无会话数据";
      }
      setStatus(sessionStatus, `会话数: ${sessions.length}`, "ok");
    } catch (e) {
      setStatus(sessionStatus, e.message, "error");
    }
  }

  async function loadSessionHistory(sessionId) {
    if (!sessionId) {
      sessionHistory.textContent = "请选择会话";
      return;
    }
    try {
      const history = await api(`/admin/sessions/${encodeURIComponent(sessionId)}`);
      sessionHistory.textContent = history.length ? JSON.stringify(history, null, 2) : "该会话暂无历史";
    } catch (e) {
      sessionHistory.textContent = e.message;
    }
  }

  refreshRagBtn.addEventListener("click", loadRagChunks);
  refreshSessionBtn.addEventListener("click", loadSessions);
  sessionPick.addEventListener("change", () => loadSessionHistory(sessionPick.value));

  clearSessionBtn.addEventListener("click", async () => {
    const sessionId = sessionPick.value;
    if (!sessionId) {
      setStatus(sessionStatus, "没有可清理的会话", "error");
      return;
    }
    if (!confirm(`确认清空会话 ${sessionId} ?`)) return;
    try {
      await api(`/admin/sessions/${encodeURIComponent(sessionId)}`, { method: "DELETE" });
      setStatus(sessionStatus, `会话 ${sessionId} 已清理`, "ok");
      await loadSessions();
    } catch (e) {
      setStatus(sessionStatus, e.message, "error");
    }
  });

  loadRagChunks();
  loadSessions();
</script>
</body>
</html>
