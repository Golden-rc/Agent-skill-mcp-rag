<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agent Hub Console</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-0: #0c1422;
      --bg-1: #13233a;
      --card: rgba(15, 22, 35, 0.86);
      --line: rgba(255, 255, 255, 0.12);
      --text: #e9eef6;
      --muted: #a6b4cb;
      --accent: #36d1b7;
      --accent-2: #ffb86a;
      --danger: #ff6d7d;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      color: var(--text);
      font-family: "Noto Sans SC", sans-serif;
      background:
        radial-gradient(900px 500px at 15% -10%, rgba(54, 209, 183, 0.2), transparent),
        radial-gradient(800px 420px at 100% 0%, rgba(255, 184, 106, 0.17), transparent),
        linear-gradient(140deg, var(--bg-0), var(--bg-1));
      min-height: 100vh;
      padding: 28px 18px;
    }

    .wrap {
      max-width: 1080px;
      margin: 0 auto;
    }

    .hero {
      margin-bottom: 20px;
      animation: fadeUp .45s ease-out both;
    }

    .hero h1 {
      margin: 0;
      font-size: clamp(1.5rem, 4vw, 2.2rem);
      font-family: "Space Grotesk", sans-serif;
      letter-spacing: 0.4px;
    }

    .hero p {
      margin: 6px 0 0;
      color: var(--muted);
      font-size: 0.96rem;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 16px;
      backdrop-filter: blur(8px);
      box-shadow: 0 18px 48px rgba(0, 0, 0, 0.25);
      animation: fadeUp .5s ease-out both;
    }

    .card h2 {
      margin: 2px 0 10px;
      font-family: "Space Grotesk", sans-serif;
      font-size: 1.1rem;
    }

    .row {
      display: grid;
      gap: 8px;
      margin-bottom: 10px;
    }

    .row.inline {
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    label {
      font-size: 0.85rem;
      color: var(--muted);
    }

    input,
    select,
    textarea,
    button {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 10px 11px;
      font: inherit;
      color: var(--text);
      background: rgba(8, 13, 22, 0.7);
    }

    textarea {
      min-height: 116px;
      resize: vertical;
    }

    button {
      border: none;
      background: linear-gradient(100deg, var(--accent), var(--accent-2));
      color: #10202a;
      font-weight: 700;
      cursor: pointer;
      transition: transform .15s ease, filter .2s ease;
    }

    button:hover {
      filter: brightness(1.05);
      transform: translateY(-1px);
    }

    .status {
      margin-top: 8px;
      color: var(--muted);
      font-size: 0.88rem;
      min-height: 20px;
    }

    .status.error {
      color: var(--danger);
    }

    .output {
      margin-top: 10px;
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 10px;
      background: rgba(7, 11, 19, 0.72);
      min-height: 170px;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
      font-size: 0.92rem;
    }

    .kpi {
      margin-top: 9px;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .tag {
      font-size: 0.78rem;
      color: #d3dff1;
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 5px 9px;
      background: rgba(255, 255, 255, 0.05);
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(8px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 900px) {
      .grid {
        grid-template-columns: 1fr;
      }
      .row.inline {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
<main class="wrap">
  <section class="hero">
    <h1>Agent Hub Frontend Console</h1>
    <p>用于本地验证 `/rag/ingest` 和 `/chat`，支持 `openai` / `ollama` / `auto`。</p>
  </section>

  <section class="grid">
    <article class="card">
      <h2>RAG Ingest</h2>
      <div class="row">
        <label for="source">Source</label>
        <input id="source" value="internship-guide" />
      </div>
      <div class="row">
        <label for="ragText">Text</label>
        <textarea id="ragText">AI工程师实习重点包括Agent架构、RAG系统搭建、工具链封装、记忆管理与安全合规优化。</textarea>
      </div>
      <button id="ingestBtn">写入知识库</button>
      <div id="ingestStatus" class="status"></div>
      <div id="ingestOutput" class="output">等待写入...</div>
    </article>

    <article class="card">
      <h2>Chat</h2>
      <div class="row inline">
        <div>
          <label for="sessionId">Session ID</label>
          <input id="sessionId" value="demo-ui-1" />
        </div>
        <div>
          <label for="provider">Provider</label>
          <select id="provider">
            <option value="auto">auto</option>
            <option value="openai">openai</option>
            <option value="ollama">ollama</option>
          </select>
        </div>
      </div>
      <div class="row">
        <label for="message">Message</label>
        <textarea id="message">请基于知识库给我一个实习项目分周计划，并列出待办</textarea>
      </div>
      <button id="chatBtn">发送消息</button>
      <div id="chatStatus" class="status"></div>
      <div class="kpi" id="chatKpi"></div>
      <div id="chatOutput" class="output">等待对话...</div>
    </article>
  </section>
</main>

<script>
  const ingestBtn = document.getElementById("ingestBtn");
  const chatBtn = document.getElementById("chatBtn");

  const ingestStatus = document.getElementById("ingestStatus");
  const ingestOutput = document.getElementById("ingestOutput");
  const chatStatus = document.getElementById("chatStatus");
  const chatOutput = document.getElementById("chatOutput");
  const chatKpi = document.getElementById("chatKpi");

  function setStatus(el, text, isError = false) {
    el.textContent = text;
    el.classList.toggle("error", isError);
  }

  function pretty(data) {
    return JSON.stringify(data, null, 2);
  }

  ingestBtn.addEventListener("click", async () => {
    setStatus(ingestStatus, "写入中...");
    ingestOutput.textContent = "";

    const payload = {
      source: document.getElementById("source").value.trim(),
      text: document.getElementById("ragText").value.trim()
    };

    try {
      const res = await fetch("/rag/ingest", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload)
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || "ingest failed");
      setStatus(ingestStatus, "写入成功");
      ingestOutput.textContent = pretty(data);
    } catch (e) {
      setStatus(ingestStatus, e.message, true);
      ingestOutput.textContent = "请求失败，请检查服务是否已启动。";
    }
  });

  chatBtn.addEventListener("click", async () => {
    setStatus(chatStatus, "请求中...");
    chatOutput.textContent = "";
    chatKpi.innerHTML = "";

    const payload = {
      sessionId: document.getElementById("sessionId").value.trim(),
      provider: document.getElementById("provider").value,
      message: document.getElementById("message").value.trim()
    };

    try {
      const res = await fetch("/chat", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload)
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || "chat failed");

      const providerTag = `<span class="tag">provider: ${data.providerUsed || "-"}</span>`;
      const toolTag = `<span class="tag">tools: ${(data.toolCalls || []).join(", ") || "none"}</span>`;
      const citeTag = `<span class="tag">citations: ${(data.citations || []).length}</span>`;
      chatKpi.innerHTML = providerTag + toolTag + citeTag;

      let text = data.answer || "";
      if (Array.isArray(data.citations) && data.citations.length > 0) {
        text += "\n\n---\n引用:\n";
        data.citations.forEach((c, i) => {
          text += `${i + 1}. [${c.source}] score=${(c.score ?? 0).toFixed(4)}\n${c.content}\n`;
        });
      }
      chatOutput.textContent = text;
      setStatus(chatStatus, "请求成功");
    } catch (e) {
      setStatus(chatStatus, e.message, true);
      chatOutput.textContent = "请求失败，请检查 API Key / 服务状态。";
    }
  });
</script>
</body>
</html>
