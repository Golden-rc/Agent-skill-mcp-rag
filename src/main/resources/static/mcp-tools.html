<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MCP Export Preview</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/common.css">
</head>
<body>
<main class="wrap">
  <section class="hero">
    <h1>MCP 导出预览</h1>
    <p>仅保留导出功能：查看并下载本地 MCP 工具清单。</p>
  </section>

  <nav class="nav">
    <a href="/">首页</a>
    <a href="/chat.html">Chat</a>
    <a href="/ingest.html">RAG Ingest</a>
    <a href="/rag.html">RAG 管理</a>
    <a href="/sessions.html">Session 管理</a>
  </nav>

  <section class="grid">
    <article class="card wide">
      <h2>导出本地 MCP 工具清单</h2>
      <div class="actions">
        <button id="refreshBtn" class="secondary">刷新工具列表</button>
        <button id="selectAllBtn" class="secondary">全选</button>
        <button id="clearSelectionBtn" class="secondary">清空勾选</button>
        <button id="exportBtn">导出共享 JSON</button>
      </div>
      <div id="localStatus" class="status"></div>
      <table>
        <thead>
          <tr>
            <th>勾选</th>
            <th>名称</th>
            <th>来源</th>
            <th>启用</th>
          </tr>
        </thead>
        <tbody id="localRows"></tbody>
      </table>
      <div id="exportOutput" class="output">导出结果会显示在这里，并自动下载 JSON 文件。</div>
    </article>
  </section>
</main>

<script src="/common.js"></script>
<script>
  const localStatus = document.getElementById("localStatus");
  const localRows = document.getElementById("localRows");
  const exportOutput = document.getElementById("exportOutput");

  function getSelectedToolNames() {
    return Array.from(document.querySelectorAll(".tool-checkbox:checked")).map((el) => el.value);
  }

  function setAllSelection(checked) {
    document.querySelectorAll(".tool-checkbox").forEach((el) => {
      el.checked = checked;
    });
  }

  async function loadLocalTools() {
    setStatus(localStatus, "加载工具中...");
    try {
      const tools = await api("/admin/mcp/tools");
      localRows.innerHTML = tools.map((t) => `
        <tr>
          <td><input type="checkbox" class="tool-checkbox" value="${esc(t.name)}" checked></td>
          <td>${esc(t.name)}</td>
          <td>${esc(t.source || "-")}</td>
          <td>${t.enabled ? "yes" : "no"}</td>
        </tr>
      `).join("");
      setStatus(localStatus, `已加载 ${tools.length} 个工具`, "ok");
    } catch (e) {
      setStatus(localStatus, e.message, "error");
    }
  }

  async function exportTools() {
    const selected = getSelectedToolNames();
    if (selected.length === 0) {
      setStatus(localStatus, "请至少勾选一个工具", "error");
      return;
    }

    setStatus(localStatus, "导出中...");
    try {
      const params = new URLSearchParams();
      selected.forEach((name) => params.append("names", name));
      const data = await api(`/admin/mcp/export?${params.toString()}`);
      exportOutput.textContent = JSON.stringify(data, null, 2);
      const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = "mcp-tool-manifest.json";
      a.click();
      URL.revokeObjectURL(url);
      setStatus(localStatus, `导出成功，已下载 JSON（${selected.length} 个工具）`, "ok");
    } catch (e) {
      setStatus(localStatus, e.message, "error");
    }
  }

  document.getElementById("refreshBtn").addEventListener("click", loadLocalTools);
  document.getElementById("selectAllBtn").addEventListener("click", () => setAllSelection(true));
  document.getElementById("clearSelectionBtn").addEventListener("click", () => setAllSelection(false));
  document.getElementById("exportBtn").addEventListener("click", exportTools);

  loadLocalTools();
</script>
</body>
</html>
