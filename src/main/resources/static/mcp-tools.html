<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MCP Tool Hub</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/common.css">
</head>
<body>
<main class="wrap">
  <section class="hero">
    <h1>MCP 工具管理中心</h1>
    <p>支持从外部 MCP 导入工具到本地，并导出共享给其他人。</p>
  </section>

  <nav class="nav">
    <a href="/">首页</a>
    <a href="/chat.html">Chat</a>
    <a href="/ingest.html">RAG Ingest</a>
    <a href="/rag.html">RAG 管理</a>
    <a href="/sessions.html">Session 管理</a>
  </nav>

  <section class="grid">
    <article class="card wide">
      <h2>导入外部 MCP 工具</h2>
      <div class="row inline-3">
        <div>
          <label for="remoteBaseUrl">Remote MCP Base URL</label>
          <input id="remoteBaseUrl" placeholder="http://localhost:9000">
        </div>
        <div>
          <label for="alias">本地别名</label>
          <input id="alias" value="remote">
        </div>
        <div style="display:flex; align-items:end; gap:8px;">
          <button id="previewBtn" class="secondary">预览远端工具</button>
          <button id="importBtn">导入选中工具</button>
        </div>
      </div>
      <div id="importStatus" class="status"></div>
      <table>
        <thead>
          <tr>
            <th>选择</th>
            <th>远端工具名</th>
            <th>描述</th>
          </tr>
        </thead>
        <tbody id="previewRows"></tbody>
      </table>
    </article>

    <article class="card wide">
      <h2>本地 MCP 工具</h2>
      <div class="actions">
        <button id="refreshLocalBtn" class="secondary">刷新本地工具</button>
        <button id="exportBtn">导出共享 JSON</button>
      </div>
      <div id="localStatus" class="status"></div>
      <table>
        <thead>
          <tr>
            <th>名称</th>
            <th>来源</th>
            <th>启用</th>
            <th>远端</th>
            <th>操作</th>
          </tr>
        </thead>
        <tbody id="localRows"></tbody>
      </table>
      <div id="exportOutput" class="output">导出结果显示在这里...</div>
    </article>
  </section>
</main>

<script src="/common.js"></script>
<script>
  const previewRows = document.getElementById("previewRows");
  const localRows = document.getElementById("localRows");
  const importStatus = document.getElementById("importStatus");
  const localStatus = document.getElementById("localStatus");
  const exportOutput = document.getElementById("exportOutput");

  async function previewRemoteTools() {
    const remoteBaseUrl = document.getElementById("remoteBaseUrl").value.trim();
    if (!remoteBaseUrl) {
      setStatus(importStatus, "请填写 remoteBaseUrl", "error");
      return;
    }
    setStatus(importStatus, "预览中...");
    try {
      const data = await api("/admin/mcp/import/preview", {
        method: "POST",
        body: JSON.stringify({ remoteBaseUrl })
      });

      const tools = data.tools || [];
      previewRows.innerHTML = tools.map((t) => `
        <tr>
          <td><input type="checkbox" class="tool-checkbox" value="${esc(t.name)}" checked></td>
          <td>${esc(t.name)}</td>
          <td>${esc(t.description || "")}</td>
        </tr>
      `).join("");
      setStatus(importStatus, `预览成功，发现 ${tools.length} 个工具`, "ok");
    } catch (e) {
      setStatus(importStatus, e.message, "error");
    }
  }

  async function importSelectedTools() {
    const remoteBaseUrl = document.getElementById("remoteBaseUrl").value.trim();
    const alias = document.getElementById("alias").value.trim() || "imported";
    const selected = Array.from(document.querySelectorAll(".tool-checkbox:checked")).map((el) => el.value);

    if (!remoteBaseUrl) {
      setStatus(importStatus, "请填写 remoteBaseUrl", "error");
      return;
    }
    setStatus(importStatus, "导入中...");
    try {
      const data = await api("/admin/mcp/import/commit", {
        method: "POST",
        body: JSON.stringify({ remoteBaseUrl, alias, toolNames: selected })
      });
      setStatus(importStatus, `导入完成: ${data.imported || 0}`, "ok");
      await loadLocalTools();
    } catch (e) {
      setStatus(importStatus, e.message, "error");
    }
  }

  async function loadLocalTools() {
    setStatus(localStatus, "加载中...");
    try {
      const tools = await api("/admin/mcp/tools");
      localRows.innerHTML = tools.map((t) => `
        <tr>
          <td>${esc(t.name)}</td>
          <td>${esc(t.source || "")}</td>
          <td>${t.enabled ? "yes" : "no"}</td>
          <td>${esc(t.remoteBaseUrl || "-")}</td>
          <td>
            <div class="actions">
              <button class="secondary toggle-btn" data-name="${encodeURIComponent(t.name)}" data-enabled="${t.enabled}">${t.enabled ? "禁用" : "启用"}</button>
              <button class="danger delete-btn" data-name="${encodeURIComponent(t.name)}">删除</button>
            </div>
          </td>
        </tr>
      `).join("");
      setStatus(localStatus, `本地工具 ${tools.length} 个`, "ok");
    } catch (e) {
      setStatus(localStatus, e.message, "error");
    }
  }

  async function exportTools() {
    setStatus(localStatus, "导出中...");
    try {
      const data = await api("/admin/mcp/export");
      exportOutput.textContent = JSON.stringify(data, null, 2);

      const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = "mcp-tool-manifest.json";
      a.click();
      URL.revokeObjectURL(url);
      setStatus(localStatus, "导出成功，已下载 JSON", "ok");
    } catch (e) {
      setStatus(localStatus, e.message, "error");
    }
  }

  document.getElementById("previewBtn").addEventListener("click", previewRemoteTools);
  document.getElementById("importBtn").addEventListener("click", importSelectedTools);
  document.getElementById("refreshLocalBtn").addEventListener("click", loadLocalTools);
  document.getElementById("exportBtn").addEventListener("click", exportTools);

  localRows.addEventListener("click", async (event) => {
    const toggleBtn = event.target.closest(".toggle-btn");
    const deleteBtn = event.target.closest(".delete-btn");

    if (toggleBtn) {
      const name = decodeURIComponent(toggleBtn.dataset.name || "");
      const enabled = !(toggleBtn.dataset.enabled === "true");
      await api(`/admin/mcp/tools/${encodeURIComponent(name)}/toggle`, {
        method: "PUT",
        body: JSON.stringify({ enabled })
      });
      await loadLocalTools();
      return;
    }

    if (deleteBtn) {
      const name = decodeURIComponent(deleteBtn.dataset.name || "");
      if (!confirm(`确认删除工具 ${name} ?`)) return;
      await api(`/admin/mcp/tools/${encodeURIComponent(name)}`, { method: "DELETE" });
      await loadLocalTools();
    }
  });

  loadLocalTools();
</script>
</body>
</html>
