<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chat Console</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/common.css">
  <style>
    .chat-layout {
      display: grid;
      grid-template-columns: 320px 1fr;
      gap: 14px;
      align-items: start;
    }

    .sidebar {
      display: grid;
      gap: 10px;
      max-height: 78vh;
    }

    .session-list {
      border: 1px solid var(--line);
      border-radius: 12px;
      background: rgba(7, 11, 19, 0.72);
      overflow: auto;
      min-height: 300px;
      max-height: 52vh;
      padding: 8px;
      display: grid;
      gap: 6px;
      align-content: start;
    }

    .session-item {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: rgba(255, 255, 255, 0.04);
      color: var(--text);
      text-align: left;
      padding: 8px 9px;
      cursor: pointer;
      display: grid;
      gap: 2px;
    }

    .session-item.active {
      background: rgba(54, 209, 183, 0.2);
      border-color: rgba(54, 209, 183, 0.55);
    }

    .session-id {
      font-size: 0.84rem;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .session-meta {
      font-size: 0.75rem;
      color: var(--muted);
    }

    .chat-pane {
      min-height: 76vh;
      display: grid;
      grid-template-rows: auto auto 1fr auto;
      gap: 10px;
    }

    .timeline {
      border: 1px solid var(--line);
      border-radius: 12px;
      background: rgba(7, 11, 19, 0.72);
      padding: 12px;
      overflow: auto;
      min-height: 380px;
      max-height: 56vh;
      display: grid;
      gap: 10px;
      align-content: start;
    }

    .msg {
      max-width: 86%;
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 9px 10px;
      line-height: 1.45;
      font-size: .92rem;
      animation: rise .2s ease-out;
    }

    .msg-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: .74rem;
      color: var(--muted);
      margin-bottom: 6px;
    }

    .msg-body {
      overflow-wrap: anywhere;
    }

    .tool-images {
      margin-top: 10px;
      display: grid;
      gap: 8px;
    }

    .tool-image {
      width: 100%;
      max-width: 640px;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: rgba(255, 255, 255, 0.04);
    }

    .msg-body p {
      margin: 0 0 9px;
      white-space: pre-wrap;
    }

    .msg-body p:last-child {
      margin-bottom: 0;
    }

    .msg-body h4 {
      margin: 10px 0 6px;
      font-size: .95rem;
      color: #d9e8ff;
    }

    .msg-body h1,
    .msg-body h2,
    .msg-body h3 {
      margin: 10px 0 6px;
      color: #e8f2ff;
      line-height: 1.3;
    }

    .msg-body h1 { font-size: 1.06rem; }
    .msg-body h2 { font-size: 1.02rem; }
    .msg-body h3 { font-size: .98rem; }

    .msg-body ul,
    .msg-body ol {
      margin: 6px 0 10px 18px;
      padding: 0;
    }

    .msg-body li {
      margin: 3px 0;
    }

    .msg-body blockquote {
      margin: 8px 0;
      padding: 7px 10px;
      border-left: 3px solid var(--accent);
      background: rgba(54, 209, 183, 0.07);
      color: #d3e2f7;
    }

    .msg-body a {
      color: #8fd4ff;
      text-decoration: underline;
      text-underline-offset: 2px;
    }

    .msg-body strong {
      color: #eef6ff;
      font-weight: 700;
    }

    .msg-body em {
      color: #dce9fb;
      font-style: italic;
    }

    .msg-body del {
      color: var(--muted);
    }

    .msg-body table {
      width: 100%;
      border-collapse: collapse;
      margin: 8px 0;
      font-size: .86rem;
      border: 1px solid var(--line);
      border-radius: 8px;
      overflow: hidden;
      display: block;
      overflow-x: auto;
    }

    .msg-body th,
    .msg-body td {
      border: 1px solid var(--line);
      padding: 6px 8px;
      text-align: left;
      vertical-align: top;
      white-space: nowrap;
    }

    .msg-body th {
      background: rgba(255, 255, 255, 0.06);
    }

    .msg-body hr {
      border: none;
      border-top: 1px solid var(--line);
      margin: 10px 0;
    }

    .inline-code {
      display: inline-block;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 0 6px;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      background: rgba(255, 255, 255, 0.06);
      font-size: .85em;
    }

    .code-wrap {
      margin: 8px 0;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: rgba(0, 0, 0, 0.28);
      overflow: hidden;
    }

    .code-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 6px 8px;
      border-bottom: 1px solid var(--line);
      color: var(--muted);
      font-size: .75rem;
      background: rgba(255, 255, 255, 0.05);
    }

    .copy-btn {
      width: auto;
      border-radius: 7px;
      padding: 3px 8px;
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid var(--line);
      color: var(--text);
      font-size: .74rem;
      cursor: pointer;
    }

    .code-wrap pre {
      margin: 0;
      padding: 9px;
      overflow: auto;
      line-height: 1.35;
      font-size: .84rem;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      white-space: pre;
    }

    .msg.user {
      justify-self: end;
      background: rgba(54, 209, 183, 0.17);
    }

    .msg.assistant {
      justify-self: start;
      background: rgba(255, 255, 255, 0.06);
    }

    .typing::after {
      content: "▋";
      margin-left: 2px;
      animation: blink 1s steps(2, start) infinite;
      color: var(--accent);
    }

    .composer {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      align-items: end;
    }

    .composer textarea {
      min-height: 88px;
    }

    .meta {
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 9px;
      background: rgba(255, 255, 255, 0.04);
      font-size: .82rem;
      color: var(--muted);
      white-space: pre-wrap;
    }

    @keyframes rise {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes blink {
      50% { opacity: 0; }
    }

    @media (max-width: 980px) {
      .chat-layout {
        grid-template-columns: 1fr;
      }
      .timeline {
        max-height: 52vh;
      }
      .sidebar {
        max-height: none;
      }
    }
  </style>
</head>
<body>
<main class="wrap">
  <section class="hero">
    <h1>Chat Console</h1>
    <p>类似 ChatGPT 的会话切换体验，点击左侧会话会刷新右侧对话历史。</p>
  </section>

  <nav class="nav">
    <a href="/">首页</a>
    <a href="/ingest.html">RAG Ingest</a>
    <a href="/agent-chat.html">Agent Chat</a>
    <a href="/rag.html">RAG 管理</a>
    <a href="/sessions.html">Session 管理</a>
  </nav>

  <section class="chat-layout">
    <article class="card sidebar">
      <h2>会话列表</h2>

      <div class="row inline">
        <div>
          <label for="sessionQuery">检索</label>
          <input id="sessionQuery" placeholder="按 sessionId 模糊查询">
        </div>
        <div>
          <label for="sessionLimit">每页</label>
          <select id="sessionLimit">
            <option value="5">5</option>
            <option value="10" selected>10</option>
            <option value="20">20</option>
          </select>
        </div>
      </div>

      <div class="actions">
        <button id="newSessionBtn">新建会话</button>
        <button id="refreshSessionBtn" class="secondary">刷新</button>
      </div>

      <div class="actions">
        <button id="prevSessionBtn" class="secondary">上一页</button>
        <button id="nextSessionBtn" class="secondary">下一页</button>
      </div>
      <div id="sessionPageInfo" class="small">第 1 页</div>

      <div id="sessionList" class="session-list"></div>
    </article>

    <article class="card chat-pane">
      <div class="row inline" style="margin-bottom:0;">
        <div>
          <label for="sessionId">Session ID</label>
          <input id="sessionId" value="demo-ui-1">
        </div>
        <div>
          <label for="provider">Provider</label>
          <select id="provider">
            <option value="auto">auto</option>
            <option value="openai">openai</option>
            <option value="ollama">ollama</option>
          </select>
        </div>
      </div>

      <div class="row inline" style="margin-bottom:0;">
        <div>
          <label for="mode">回答模式</label>
          <select id="mode">
            <option value="auto">auto（智能）</option>
            <option value="direct">严格直答</option>
            <option value="rag">知识库增强</option>
          </select>
        </div>
        <div class="small" style="display:flex;align-items:end;">
          `严格直答` 现在也会带最近上下文；`知识库增强` 会优先使用知识库证据。
        </div>
      </div>

      <div class="row inline" style="margin-bottom:0; align-items:end;">
        <div>
          <label for="orchestrator">编排器</label>
          <select id="orchestrator">
            <option value="auto" selected>auto（跟随后端配置）</option>
            <option value="classic">classic</option>
            <option value="agent">agent</option>
          </select>
        </div>
        <div>
          <label for="toolTestMode">协议测试</label>
          <select id="toolTestMode">
            <option value="off" selected>关闭</option>
            <option value="on">开启（优先tools/tool_calls）</option>
          </select>
        </div>
        <div class="small" style="display:flex;align-items:end;">
          开启后会尝试强制走协议工具链路（建议 provider 选 openai）。
        </div>
      </div>

      <div id="chatStatus" class="status"></div>
      <div id="chatKpi" class="kpi"></div>

      <div id="timeline" class="timeline"></div>

      <div class="composer">
        <div class="row" style="margin-bottom:0;">
          <label for="message">Message</label>
          <textarea id="message"></textarea>
          <div class="small">回车发送，Shift+回车换行。</div>
        </div>
        <button id="chatBtn">发送消息</button>
      </div>

      <div id="chatMeta" class="meta">等待响应...</div>
      <div id="toolProtocolView" class="meta" style="margin-top:10px;">工具协议可视化：等待请求...</div>
    </article>
  </section>
</main>

<script src="/common.js"></script>
<script>
  const chatBtn = document.getElementById("chatBtn");
  const sessionIdInput = document.getElementById("sessionId");
  const providerSelect = document.getElementById("provider");
  const modeSelect = document.getElementById("mode");
  const orchestratorSelect = document.getElementById("orchestrator");
  const toolTestModeSelect = document.getElementById("toolTestMode");
  const messageInput = document.getElementById("message");

  const chatStatus = document.getElementById("chatStatus");
  const chatKpi = document.getElementById("chatKpi");
  const chatMeta = document.getElementById("chatMeta");
  const toolProtocolView = document.getElementById("toolProtocolView");
  const timeline = document.getElementById("timeline");

  const sessionList = document.getElementById("sessionList");
  const sessionPageInfo = document.getElementById("sessionPageInfo");
  const sessionQuery = document.getElementById("sessionQuery");
  const sessionLimit = document.getElementById("sessionLimit");
  const refreshSessionBtn = document.getElementById("refreshSessionBtn");
  const prevSessionBtn = document.getElementById("prevSessionBtn");
  const nextSessionBtn = document.getElementById("nextSessionBtn");
  const newSessionBtn = document.getElementById("newSessionBtn");

  let isSending = false;
  let sessionOffset = 0;
  let sessionTotal = 0;
  let activeSessionId = sessionIdInput.value.trim();

  function nowTime() {
    return new Date().toLocaleTimeString("zh-CN", { hour: "2-digit", minute: "2-digit" });
  }

  function escapeHtml(text) {
    return (text || "").replace(/[&<>\"']/g, (m) => ({
      "&": "&amp;",
      "<": "&lt;",
      ">": "&gt;",
      '"': "&quot;",
      "'": "&#39;"
    }[m]));
  }

  function renderInline(text) {
    const codeTokens = [];
    const source = String(text || "").replace(/`([^`]+)`/g, (_, code) => {
      const token = `@@CODE_${codeTokens.length}@@`;
      codeTokens.push(`<span class="inline-code">${escapeHtml(code)}</span>`);
      return token;
    });

    let html = escapeHtml(source);

    // Markdown links: [title](https://example.com)
    html = html.replace(/\[([^\]]+)]\((https?:\/\/[^\s)]+)\)/g, (_, label, url) => {
      const safeUrl = url.replace(/"/g, "&quot;");
      return `<a href="${safeUrl}" target="_blank" rel="noopener noreferrer">${label}</a>`;
    });

    // Strong / emphasis / strikethrough.
    html = html.replace(/\*\*([^*\n]+)\*\*/g, "<strong>$1</strong>");
    html = html.replace(/__([^_\n]+)__/g, "<strong>$1</strong>");
    html = html.replace(/~~([^~\n]+)~~/g, "<del>$1</del>");
    html = html.replace(/(^|[\s(>])\*([^*\n]+)\*(?=$|[\s).,!?:;])/g, "$1<em>$2</em>");
    html = html.replace(/(^|[\s(>])_([^_\n]+)_(?=$|[\s).,!?:;])/g, "$1<em>$2</em>");

    // Restore inline code tokens at last.
    html = html.replace(/@@CODE_(\d+)@@/g, (_, idx) => codeTokens[Number(idx)] || "");
    return html;
  }

  function parseRichText(text) {
    const src = text || "";
    const blocks = [];
    const re = /```([\w-]+)?\n([\s\S]*?)```/g;
    let idx = 0;
    let m;
    while ((m = re.exec(src)) !== null) {
      const before = src.slice(idx, m.index);
      if (before) blocks.push({ type: "text", value: before });
      blocks.push({ type: "code", lang: (m[1] || "text").toLowerCase(), value: m[2] || "" });
      idx = re.lastIndex;
    }
    if (idx < src.length) blocks.push({ type: "text", value: src.slice(idx) });
    return blocks;
  }

  function renderTextSegment(segment) {
    const lines = segment.replace(/\r\n/g, "\n").split("\n");
    const out = [];
    let inUl = false;
    let inOl = false;
    let paragraph = [];

    function flushParagraph() {
      if (!paragraph.length) return;
      const joined = paragraph.join("\n");
      out.push(`<p>${renderInline(joined).replace(/\n/g, "<br>")}</p>`);
      paragraph = [];
    }

    function closeLists() {
      if (inUl) out.push("</ul>");
      if (inOl) out.push("</ol>");
      inUl = false;
      inOl = false;
    }

    function splitTableRow(row) {
      return row
        .trim()
        .replace(/^\|/, "")
        .replace(/\|$/, "")
        .split("|")
        .map((cell) => renderInline(cell.trim()));
    }

    function isTableDivider(line) {
      return /^\|?\s*:?-{3,}:?\s*(\|\s*:?-{3,}:?\s*)+\|?$/.test(line.trim());
    }

    for (let i = 0; i < lines.length; i += 1) {
      const raw = lines[i];
      const t = raw.trim();
      if (!t) {
        flushParagraph();
        closeLists();
        continue;
      }

      if (t.includes("|") && i + 1 < lines.length && isTableDivider(lines[i + 1])) {
        flushParagraph();
        closeLists();

        const header = splitTableRow(t);
        const rows = [];
        i += 2;
        while (i < lines.length && lines[i].trim().includes("|")) {
          rows.push(splitTableRow(lines[i]));
          i += 1;
        }
        i -= 1;

        const thead = `<thead><tr>${header.map((c) => `<th>${c}</th>`).join("")}</tr></thead>`;
        const tbody = rows.length
          ? `<tbody>${rows.map((r) => `<tr>${r.map((c) => `<td>${c}</td>`).join("")}</tr>`).join("")}</tbody>`
          : "";
        out.push(`<table>${thead}${tbody}</table>`);
        continue;
      }

      const h = t.match(/^(#{1,4})\s+(.*)$/);
      if (h) {
        flushParagraph();
        closeLists();
        const level = Math.min(4, h[1].length);
        out.push(`<h${level}>${renderInline(h[2])}</h${level}>`);
        continue;
      }

      if (/^---+$/.test(t)) {
        flushParagraph();
        closeLists();
        out.push("<hr>");
        continue;
      }

      if (t.startsWith(">")) {
        flushParagraph();
        closeLists();
        const quote = [];
        while (i < lines.length && lines[i].trim().startsWith(">")) {
          quote.push(lines[i].trim().replace(/^>\s*/, ""));
          i += 1;
        }
        i -= 1;
        out.push(`<blockquote>${renderInline(quote.join("\n")).replace(/\n/g, "<br>")}</blockquote>`);
        continue;
      }

      const ul = t.match(/^[-*]\s+(.*)$/);
      if (ul) {
        flushParagraph();
        if (inOl) {
          out.push("</ol>");
          inOl = false;
        }
        if (!inUl) {
          out.push("<ul>");
          inUl = true;
        }
        const task = ul[1].match(/^\[( |x|X)]\s+(.*)$/);
        if (task) {
          const checked = /x/i.test(task[1]);
          out.push(`<li><input type="checkbox" disabled ${checked ? "checked" : ""}> ${renderInline(task[2])}</li>`);
        } else {
          out.push(`<li>${renderInline(ul[1])}</li>`);
        }
        continue;
      }

      const ol = t.match(/^\d+[.)]\s+(.*)$/);
      if (ol) {
        flushParagraph();
        if (inUl) {
          out.push("</ul>");
          inUl = false;
        }
        if (!inOl) {
          out.push("<ol>");
          inOl = true;
        }
        out.push(`<li>${renderInline(ol[1])}</li>`);
        continue;
      }

      if (inUl || inOl) {
        closeLists();
      }
      paragraph.push(raw.trimEnd());
    }

    flushParagraph();
    closeLists();
    return out.join("\n");
  }

  function renderRichMessage(container, text) {
    const parts = parseRichText(text);
    const html = parts.map((part) => {
      if (part.type === "code") {
        const isShell = ["bash", "sh", "zsh", "shell", "cmd", "powershell"].includes(part.lang);
        const title = isShell ? "命令行" : part.lang;
        const content = escapeHtml(part.value);
        const copyPayload = content
          .replace(/&quot;/g, "\"")
          .replace(/&lt;/g, "<")
          .replace(/&gt;/g, ">")
          .replace(/&amp;/g, "&");
        return `
          <div class="code-wrap">
            <div class="code-top">
              <span>${title}</span>
              <button class="copy-btn" data-copy="${escapeHtml(copyPayload)}">复制</button>
            </div>
            <pre><code>${content}</code></pre>
          </div>
        `;
      }
      return renderTextSegment(part.value);
    }).join("\n");

    container.innerHTML = html || `<p>${renderInline(text || "")}</p>`;
  }

  function renderToolImages(container, imageUrls) {
    if (!Array.isArray(imageUrls) || imageUrls.length === 0) {
      return;
    }
    const wrap = document.createElement("div");
    wrap.className = "tool-images";
    imageUrls.forEach((url) => {
      if (!url) return;
      const img = document.createElement("img");
      img.className = "tool-image";
      img.src = url;
      img.alt = "screenshot";
      img.loading = "lazy";
      wrap.appendChild(img);
    });
    if (wrap.childNodes.length > 0) {
      container.appendChild(wrap);
    }
  }

  function shortText(text, maxLen = 80) {
    const value = String(text || "").replace(/\s+/g, " ").trim();
    if (!value) return "";
    if (value.length <= maxLen) return value;
    return value.slice(0, maxLen) + "...";
  }

  function appendMessage(role, initialText = "") {
    const wrap = document.createElement("div");
    wrap.className = `msg ${role}`;

    const head = document.createElement("div");
    head.className = "msg-head";
    head.innerHTML = `<span>${role === "user" ? "你" : "助手"}</span><span>${nowTime()}</span>`;

    const body = document.createElement("div");
    body.className = "msg-body";
    body.textContent = initialText;

    wrap.appendChild(head);
    wrap.appendChild(body);
    timeline.appendChild(wrap);
    timeline.scrollTop = timeline.scrollHeight;
    return { wrap, body };
  }

  function startAgentProgress(statusNode, assistantNode) {
    const started = Date.now();
    const phases = ["路由请求", "模型思考", "工具调用", "整理答案"];
    let tick = 0;

    const timer = setInterval(() => {
      tick += 1;
      const elapsed = Math.floor((Date.now() - started) / 1000);
      const phase = phases[Math.min(phases.length - 1, Math.floor(elapsed / 4))];
      setStatus(statusNode, `执行中 · ${phase} · ${elapsed}s`);
      if (assistantNode) {
        const dots = ".".repeat((tick % 3) + 1);
        assistantNode.textContent = `思考中${dots}\n${phase} (${elapsed}s)`;
      }
    }, 1000);

    return () => clearInterval(timer);
  }

  function clearTimeline() {
    timeline.innerHTML = "";
  }

  function renderHistory(history) {
    clearTimeline();
    if (!Array.isArray(history) || history.length === 0) {
      const msg = appendMessage("assistant", "");
      renderRichMessage(msg.body, "当前会话暂无历史，你可以直接开始提问。");
      return;
    }

    history.forEach((item) => {
      const role = item.role === "user" ? "user" : "assistant";
      const msg = appendMessage(role, "");
      renderRichMessage(msg.body, item.content || "");
    });
  }

  async function typeText(el, text, speed = 16) {
    el.body.classList.add("typing");
    el.body.textContent = "";
    for (let i = 0; i < text.length; i += 1) {
      el.body.textContent += text[i];
      if (i % 2 === 0) timeline.scrollTop = timeline.scrollHeight;
      await new Promise((resolve) => setTimeout(resolve, speed));
    }
    el.body.classList.remove("typing");
    renderRichMessage(el.body, text);
    timeline.scrollTop = timeline.scrollHeight;
  }

  async function loadSessionHistory(sessionId) {
    const data = await api(`/admin/sessions/${encodeURIComponent(sessionId)}`);
    renderHistory(data);
  }

  async function switchSession(sessionId) {
    if (!sessionId) return;
    activeSessionId = sessionId;
    sessionIdInput.value = sessionId;
    setStatus(chatStatus, `已切换会话: ${sessionId}`, "ok");
    await loadSessionHistory(sessionId);
    await loadSessionList();
  }

  function renderSessionList(rows) {
    if (!rows.length) {
      sessionList.innerHTML = `<div class="small">暂无会话，点击“新建会话”开始。</div>`;
      return;
    }

    sessionList.innerHTML = rows.map((s) => {
      const activeCls = s.sessionId === activeSessionId ? "active" : "";
      return `
        <button class="session-item ${activeCls}" data-session="${encodeURIComponent(s.sessionId)}">
          <div class="session-id">${esc(s.sessionId)}</div>
          <div class="session-meta">消息 ${s.messageCount} 条 · TTL ${s.ttlSeconds}s</div>
        </button>
      `;
    }).join("");
  }

  async function loadSessionList() {
    const limit = Number(sessionLimit.value || 10);
    const query = sessionQuery.value.trim();
    const params = new URLSearchParams({
      limit: String(limit),
      offset: String(sessionOffset),
      query
    });
    const res = await fetch(`/admin/sessions?${params.toString()}`);
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || `HTTP ${res.status}`);

    sessionTotal = Number(res.headers.get("X-Total-Count") || data.length);
    renderSessionList(data);

    const page = Math.floor(sessionOffset / limit) + 1;
    const pages = Math.max(1, Math.ceil(sessionTotal / limit));
    sessionPageInfo.textContent = `第 ${page} / ${pages} 页，共 ${sessionTotal} 条`;
    prevSessionBtn.disabled = sessionOffset <= 0;
    nextSessionBtn.disabled = sessionOffset + limit >= sessionTotal;
  }

  chatBtn.addEventListener("click", async () => {
    if (isSending) return;
    let stopProgress = () => {};
    try {
      isSending = true;
      setStatus(chatStatus, "请求中...");
      chatKpi.innerHTML = "";

      const userInput = messageInput.value.trim();
      if (!userInput) {
        setStatus(chatStatus, "请输入消息", "error");
        return;
      }

      const sessionId = sessionIdInput.value.trim();
      activeSessionId = sessionId;
      const userMsg = appendMessage("user", "");
      renderRichMessage(userMsg.body, userInput);
      const assistantEl = appendMessage("assistant", "思考中...");
      stopProgress = startAgentProgress(chatStatus, assistantEl.body);

      const payload = {
        sessionId,
        provider: providerSelect.value,
        mode: modeSelect.value,
        toolTestMode: toolTestModeSelect.value === "on",
        message: userInput
      };
      if (orchestratorSelect.value !== "auto") {
        payload.orchestrator = orchestratorSelect.value;
      }

      const data = await api("/chat", { method: "POST", body: JSON.stringify(payload) });
      stopProgress();
      chatKpi.innerHTML =
        `<span class="tag">provider: ${esc(data.providerUsed || "-")}</span>` +
        `<span class="tag">mode: ${esc(data.modeUsed || "-")}</span>` +
        `<span class="tag">reason: ${esc(data.modeReason || "-")}</span>` +
        `<span class="tag">orch: ${esc(data.orchestratorUsed || "-")}</span>` +
        `<span class="tag">orchReason: ${esc(data.orchestratorReason || "-")}</span>` +
        `<span class="tag">tools: ${esc((data.toolCalls || []).join(", ") || "none")}</span>` +
        `<span class="tag">citations: ${(data.citations || []).length}</span>` +
        `<span class="tag">images: ${(data.imageUrls || []).length}</span>` +
        `<span class="tag">toolProtocol: ${data.toolProtocolUsed ? "on" : "off"}</span>` +
        `<span class="tag">rounds: ${Number(data.toolRounds || 0)}</span>` +
        `<span class="tag">latencies: ${((data.toolRoundLatenciesMs || []).join("/") || "-")}</span>`;

      let out = data.answer || "";
      if ((data.citations || []).length > 0) {
        out += "\n\n---\n引用:\n";
        (data.citations || []).forEach((c, idx) => {
          out += `${idx + 1}. [${c.source}] score=${(c.score || 0).toFixed(4)} ${shortText(c.content)}\n`;
        });
      }
      await typeText(assistantEl, out, 15);
      renderToolImages(assistantEl.body, data.imageUrls || []);

      chatMeta.textContent = JSON.stringify({
        provider: data.providerUsed,
        modeUsed: data.modeUsed,
        modeReason: data.modeReason,
        orchestratorUsed: data.orchestratorUsed,
        orchestratorReason: data.orchestratorReason,
        toolCalls: data.toolCalls || [],
        toolProtocolUsed: Boolean(data.toolProtocolUsed),
        toolRounds: Number(data.toolRounds || 0),
        toolRoundLatenciesMs: data.toolRoundLatenciesMs || [],
        toolErrors: data.toolErrors || [],
        imageUrls: data.imageUrls || [],
        citations: (data.citations || []).length,
        requestMode: modeSelect.value,
        requestOrchestrator: orchestratorSelect.value,
        toolTestMode: toolTestModeSelect.value,
        sessionId
      }, null, 2);

      toolProtocolView.textContent = JSON.stringify({
        toolProtocolUsed: Boolean(data.toolProtocolUsed),
        rounds: Number(data.toolRounds || 0),
        roundLatenciesMs: data.toolRoundLatenciesMs || [],
        calls: data.toolCalls || [],
        errors: data.toolErrors || []
      }, null, 2);

      setStatus(chatStatus, "请求成功", "ok");
      await loadSessionList();
    } catch (e) {
      stopProgress();
      setStatus(chatStatus, e.message, "error");
      const errMsg = appendMessage("assistant", "");
      renderRichMessage(errMsg.body, "请求失败，请检查 API Key / 服务状态。\n" + e.message);
    } finally {
      stopProgress();
      isSending = false;
    }
  });

  messageInput.addEventListener("keydown", (event) => {
    if (event.isComposing) {
      return;
    }
    if (event.key === "Enter" && !event.shiftKey) {
      event.preventDefault();
      chatBtn.click();
    }
  });

  timeline.addEventListener("click", async (event) => {
    const copyBtn = event.target.closest(".copy-btn");
    if (!copyBtn) {
      return;
    }
    const raw = copyBtn.getAttribute("data-copy") || "";
    try {
      await navigator.clipboard.writeText(raw);
      const old = copyBtn.textContent;
      copyBtn.textContent = "已复制";
      setTimeout(() => {
        copyBtn.textContent = old;
      }, 1200);
    } catch (_) {
      setStatus(chatStatus, "复制失败，请手动复制", "error");
    }
  });

  sessionList.addEventListener("click", async (event) => {
    const btn = event.target.closest(".session-item");
    if (!btn) return;
    if (isSending) {
      setStatus(chatStatus, "当前正在生成回复，请稍后切换会话", "error");
      return;
    }
    await switchSession(decodeURIComponent(btn.dataset.session || ""));
  });

  newSessionBtn.addEventListener("click", async () => {
    if (isSending) return;
    const newId = `session-${Date.now()}`;
    activeSessionId = newId;
    sessionIdInput.value = newId;
    clearTimeline();
    const hint = appendMessage("assistant", "");
    renderRichMessage(hint.body, "新会话已创建，开始提问吧。\n(提示：消息发送后该会话会自动进入列表)");
    setStatus(chatStatus, `已创建新会话: ${newId}`, "ok");
    await loadSessionList();
  });

  refreshSessionBtn.addEventListener("click", async () => {
    sessionOffset = 0;
    await loadSessionList();
  });

  prevSessionBtn.addEventListener("click", async () => {
    const limit = Number(sessionLimit.value || 10);
    sessionOffset = Math.max(0, sessionOffset - limit);
    await loadSessionList();
  });

  nextSessionBtn.addEventListener("click", async () => {
    const limit = Number(sessionLimit.value || 10);
    if (sessionOffset + limit < sessionTotal) {
      sessionOffset += limit;
      await loadSessionList();
    }
  });

  sessionLimit.addEventListener("change", async () => {
    sessionOffset = 0;
    await loadSessionList();
  });

  sessionQuery.addEventListener("keydown", async (event) => {
    if (event.key === "Enter") {
      sessionOffset = 0;
      await loadSessionList();
    }
  });

  (async function init() {
    try {
      await loadSessionList();
      await switchSession(activeSessionId);
    } catch (e) {
      setStatus(chatStatus, e.message, "error");
    }
  })();
</script>
</body>
</html>
