<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agent 专区</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/common.css">
  <style>
    .panel { max-width: 1160px; margin: 0 auto; }
    .layout { display: grid; grid-template-columns: 280px 1fr; gap: 12px; align-items: start; }
    .timeline { border: 1px solid var(--line); border-radius: 12px; padding: 12px; min-height: 280px; max-height: 58vh; overflow: auto; background: rgba(255,255,255,.03); display: grid; gap: 10px; }
    .msg { border: 1px solid var(--line); border-radius: 10px; padding: 10px; white-space: pre-wrap; }
    .msg.user { background: rgba(54,209,183,.15); }
    .msg.assistant { background: rgba(255,255,255,.06); }
    .composer { display: grid; grid-template-columns: 1fr auto; gap: 10px; align-items: end; }
    .meta { border: 1px solid var(--line); border-radius: 10px; padding: 9px; background: rgba(255,255,255,.04); font-size: .82rem; color: var(--muted); white-space: pre-wrap; }
    .run-log { border: 1px solid var(--line); border-radius: 10px; padding: 10px; background: rgba(255,255,255,.03); max-height: 36vh; overflow: auto; display: grid; gap: 8px; }
    .run-card { border: 1px solid var(--line); border-radius: 9px; padding: 8px; background: rgba(255,255,255,.04); }
    .run-head { font-size: .8rem; color: var(--muted); margin-bottom: 4px; }
    .run-lines { white-space: pre-wrap; font-size: .83rem; line-height: 1.4; }
    .session-list { border: 1px solid var(--line); border-radius: 12px; background: rgba(255,255,255,.03); max-height: 70vh; overflow: auto; display: grid; gap: 8px; padding: 8px; }
    .session-item { border: 1px solid var(--line); border-radius: 10px; background: rgba(255,255,255,.04); color: var(--text); text-align: left; padding: 8px; cursor: pointer; }
    .session-item.active { border-color: rgba(54,209,183,.6); background: rgba(54,209,183,.18); }
    .session-id { font-size: .82rem; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .session-meta { font-size: .74rem; color: var(--muted); margin-top: 3px; }
    .policy-box { border: 1px solid var(--line); border-radius: 10px; padding: 10px; background: rgba(255,255,255,.03); margin-top: 10px; }
    .tool-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 6px; max-height: 150px; overflow: auto; border: 1px solid var(--line); border-radius: 8px; padding: 7px; background: rgba(255,255,255,.03); }
    .tool-item { display: flex; align-items: center; gap: 6px; font-size: .82rem; color: var(--muted); }
    .manual-box { border: 1px solid var(--line); border-radius: 10px; padding: 10px; background: rgba(255,255,255,.03); margin-top: 10px; display: grid; gap: 8px; }
    .manual-out { border: 1px solid var(--line); border-radius: 8px; padding: 8px; min-height: 80px; max-height: 200px; overflow: auto; white-space: pre-wrap; font-size: .82rem; }

    @media (max-width: 980px) {
      .layout { grid-template-columns: 1fr; }
      .session-list { max-height: 200px; }
    }
  </style>
</head>
<body>
<main class="wrap panel">
  <section class="hero">
    <h1>Agent 调试专区</h1>
    <p>此页面固定走 `orchestrator=agent`，便于与 classic 对话页分离测试。</p>
  </section>

  <nav class="nav">
    <a href="/">首页</a>
    <a href="/chat.html">Classic Chat</a>
    <a href="/agent-chat.html">Agent Chat</a>
  </nav>

  <section class="card">
    <div class="layout">
      <aside class="row" style="margin-bottom:0;">
        <div class="row inline" style="margin-bottom:8px; grid-template-columns: 1fr 1fr;">
          <button id="newSessionBtn" type="button">新建会话</button>
          <button id="refreshSessionsBtn" type="button">刷新列表</button>
        </div>
        <div id="sessionList" class="session-list"></div>
      </aside>

      <div>
        <div class="row inline" style="margin-bottom:0;">
          <div>
            <label for="sessionId">Session ID</label>
            <input id="sessionId" value="agent-ui-1">
          </div>
          <div>
            <label for="provider">Provider</label>
            <select id="provider">
              <option value="openai" selected>openai</option>
              <option value="auto">auto</option>
              <option value="ollama">ollama</option>
            </select>
          </div>
          <div>
            <label for="mode">Mode</label>
            <select id="mode">
              <option value="auto" selected>auto</option>
              <option value="direct">direct</option>
              <option value="rag">rag</option>
            </select>
          </div>
        </div>

        <div class="policy-box">
          <div class="row inline" style="margin-bottom:8px; grid-template-columns: 1fr 1fr;">
            <div>
              <label for="toolControlMode">工具控制模式</label>
              <select id="toolControlMode">
                <option value="auto" selected>自动（不限制）</option>
                <option value="controlled">受控（白名单）</option>
              </select>
            </div>
            <div style="display:flex; align-items:end;">
              <label class="tool-item" style="font-size:.9rem;color:var(--text);">
                <input id="internetEnabled" type="checkbox" checked>
                允许联网工具
              </label>
            </div>
          </div>
          <div>
            <label>允许工具（受控模式生效）</label>
            <div id="allowedTools" class="tool-grid"></div>
          </div>
        </div>

        <div class="manual-box">
          <div class="row inline" style="margin-bottom:0; grid-template-columns: 1fr 2fr auto; align-items:end;">
            <div>
              <label for="manualTool">手动调用工具</label>
              <select id="manualTool"></select>
            </div>
            <div>
              <label for="manualArgs">Arguments(JSON)</label>
              <textarea id="manualArgs" placeholder='例如: {"url":"https://baidu.com"}'></textarea>
            </div>
            <button id="manualCallBtn" type="button">调用</button>
          </div>
          <div id="manualOut" class="manual-out">手动调用输出会显示在这里。</div>
        </div>

        <div id="status" class="status"></div>
        <div id="timeline" class="timeline"></div>

        <div class="composer" style="margin-top:10px;">
          <div class="row" style="margin-bottom:0;">
            <label for="message">Message</label>
            <textarea id="message" placeholder="例如：帮我查一下上海现在天气"></textarea>
          </div>
          <button id="sendBtn">发送</button>
        </div>

        <div id="meta" class="meta" style="margin-top:10px;">等待请求...</div>
        <div id="runLog" class="run-log" style="margin-top:10px;"></div>
      </div>
    </div>
  </section>
</main>

<script src="/common.js"></script>
<script>
  const sendBtn = document.getElementById("sendBtn");
  const sessionIdInput = document.getElementById("sessionId");
  const providerSelect = document.getElementById("provider");
  const modeSelect = document.getElementById("mode");
  const messageInput = document.getElementById("message");
  const timeline = document.getElementById("timeline");
  const statusEl = document.getElementById("status");
  const metaEl = document.getElementById("meta");
  const runLogEl = document.getElementById("runLog");
  const sessionListEl = document.getElementById("sessionList");
  const newSessionBtn = document.getElementById("newSessionBtn");
  const refreshSessionsBtn = document.getElementById("refreshSessionsBtn");
  const toolControlModeSelect = document.getElementById("toolControlMode");
  const internetEnabledInput = document.getElementById("internetEnabled");
  const allowedToolsEl = document.getElementById("allowedTools");
  const manualToolSelect = document.getElementById("manualTool");
  const manualArgsInput = document.getElementById("manualArgs");
  const manualCallBtn = document.getElementById("manualCallBtn");
  const manualOutEl = document.getElementById("manualOut");
  const SESSION_STORAGE_KEY = "agent.chat.session.id";
  const TOOL_MODE_STORAGE_KEY = "agent.chat.tool.mode";
  const INTERNET_STORAGE_KEY = "agent.chat.internet.enabled";
  const ALLOWED_TOOLS_STORAGE_KEY = "agent.chat.allowed.tools";
  let activeSessionId = "";
  let cachedTools = [];
  const runRecords = [];

  function addMsg(role, text) {
    const div = document.createElement("div");
    div.className = `msg ${role}`;
    div.textContent = text;
    timeline.appendChild(div);
    timeline.scrollTop = timeline.scrollHeight;
    return div;
  }

  function nowTs() {
    return new Date().toLocaleTimeString("zh-CN", { hour: "2-digit", minute: "2-digit", second: "2-digit" });
  }

  function clearTimeline() {
    timeline.innerHTML = "";
  }

  function renderHistory(history) {
    clearTimeline();
    if (!Array.isArray(history) || history.length === 0) {
      addMsg("assistant", "当前会话暂无历史，开始提问吧。");
      return;
    }
    history.forEach((item) => {
      const role = item.role === "user" ? "user" : "assistant";
      addMsg(role, item.content || "");
    });
  }

  function renderSessionList(rows) {
    if (!Array.isArray(rows) || rows.length === 0) {
      sessionListEl.innerHTML = `<div class="small">暂无会话记录。</div>`;
      return;
    }
    sessionListEl.innerHTML = rows.map((s) => {
      const active = s.sessionId === activeSessionId ? "active" : "";
      return `
        <button class="session-item ${active}" data-session="${encodeURIComponent(s.sessionId)}" type="button">
          <div class="session-id">${esc(s.sessionId)}</div>
          <div class="session-meta">消息 ${s.messageCount} 条 · TTL ${s.ttlSeconds}s</div>
        </button>
      `;
    }).join("");
  }

  function renderAllowedTools(tools) {
    if (!Array.isArray(tools) || tools.length === 0) {
      allowedToolsEl.innerHTML = `<div class="small">暂无可用工具</div>`;
      manualToolSelect.innerHTML = `<option value="">(none)</option>`;
      return;
    }
    const selected = new Set(loadAllowedToolsFromStorage());
    allowedToolsEl.innerHTML = tools.map((tool) => {
      const checked = selected.has(tool.name) ? "checked" : "";
      return `<label class="tool-item"><input type="checkbox" value="${esc(tool.name)}" ${checked}>${esc(tool.name)}</label>`;
    }).join("");
    manualToolSelect.innerHTML = tools.map((tool) => `<option value="${esc(tool.name)}">${esc(tool.name)}</option>`).join("");
    if (!manualArgsInput.value.trim()) {
      manualArgsInput.value = "{}";
    }
  }

  function loadAllowedToolsFromStorage() {
    try {
      const raw = localStorage.getItem(ALLOWED_TOOLS_STORAGE_KEY);
      if (!raw) {
        return [];
      }
      const parsed = JSON.parse(raw);
      return Array.isArray(parsed) ? parsed : [];
    } catch (e) {
      return [];
    }
  }

  function getSelectedAllowedTools() {
    return Array.from(allowedToolsEl.querySelectorAll("input[type='checkbox']:checked"))
      .map((node) => node.value)
      .filter(Boolean);
  }

  function persistToolPolicy() {
    localStorage.setItem(TOOL_MODE_STORAGE_KEY, toolControlModeSelect.value);
    localStorage.setItem(INTERNET_STORAGE_KEY, internetEnabledInput.checked ? "1" : "0");
    localStorage.setItem(ALLOWED_TOOLS_STORAGE_KEY, JSON.stringify(getSelectedAllowedTools()));
  }

  function applyStoredToolPolicy() {
    const mode = localStorage.getItem(TOOL_MODE_STORAGE_KEY);
    if (mode === "controlled") {
      toolControlModeSelect.value = "controlled";
    }
    const internet = localStorage.getItem(INTERNET_STORAGE_KEY);
    if (internet === "0") {
      internetEnabledInput.checked = false;
    }
  }

  async function loadToolMetadata() {
    try {
      const rows = await api("/admin/mcp/tools");
      cachedTools = (rows || []).filter((item) => item.enabled !== false);
      renderAllowedTools(cachedTools);
    } catch (e) {
      allowedToolsEl.innerHTML = `<div class="small">工具列表加载失败: ${esc(e.message || "unknown")}</div>`;
      manualToolSelect.innerHTML = `<option value="">(load failed)</option>`;
    }
  }

  function attachToolPolicyIntoPayload(payload) {
    if (toolControlModeSelect.value !== "controlled") {
      payload.allowedTools = [];
      payload.internetEnabled = true;
      return;
    }
    payload.allowedTools = getSelectedAllowedTools();
    payload.internetEnabled = internetEnabledInput.checked;
  }

  async function loadSessionList() {
    try {
      const rows = await api("/admin/sessions?limit=30&offset=0");
      renderSessionList(rows || []);
    } catch (e) {
      sessionListEl.innerHTML = `<div class="small">会话列表加载失败: ${esc(e.message || "unknown")}</div>`;
    }
  }

  async function loadHistory(sessionId) {
    try {
      const rows = await api(`/admin/sessions/${encodeURIComponent(sessionId)}`);
      renderHistory(rows || []);
    } catch (e) {
      clearTimeline();
      addMsg("assistant", `历史加载失败: ${e.message}`);
    }
  }

  async function switchSession(sessionId) {
    if (!sessionId) return;
    activeSessionId = sessionId;
    sessionIdInput.value = sessionId;
    localStorage.setItem(SESSION_STORAGE_KEY, sessionId);
    setStatus(statusEl, `已切换会话: ${sessionId}`, "ok");
    await loadHistory(sessionId);
    await loadSessionList();
  }

  function renderRunLog() {
    if (runRecords.length === 0) {
      runLogEl.textContent = "执行流程可视化：等待请求...";
      return;
    }
    runLogEl.innerHTML = runRecords.map((r) => `
      <div class="run-card">
        <div class="run-head">#${r.id} · ${r.startedAt} · ${r.status}</div>
        <div class="run-lines">${esc(r.lines.join("\n"))}</div>
      </div>
    `).join("");
  }

  function createRunRecord(message) {
    const rec = {
      id: runRecords.length + 1,
      startedAt: nowTs(),
      status: "running",
      lines: [`[${nowTs()}] 用户输入: ${message}`]
    };
    runRecords.unshift(rec);
    if (runRecords.length > 30) {
      runRecords.pop();
    }
    renderRunLog();
    return {
      line(text) {
        rec.lines.push(`[${nowTs()}] ${text}`);
        renderRunLog();
      },
      done(text) {
        if (text) rec.lines.push(`[${nowTs()}] ${text}`);
        rec.status = "done";
        renderRunLog();
      },
      fail(text) {
        rec.lines.push(`[${nowTs()}] ${text}`);
        rec.status = "failed";
        renderRunLog();
      }
    };
  }

  function startAgentProgress(statusNode, assistantNode, onPhase) {
    const started = Date.now();
    const phases = ["正在路由编排器", "正在调用模型", "正在尝试工具", "正在整理答案"];
    let tick = 0;
    let phaseIndex = -1;

    const timer = setInterval(() => {
      tick += 1;
      const elapsed = Math.floor((Date.now() - started) / 1000);
      const currentIndex = Math.min(phases.length - 1, Math.floor(elapsed / 4));
      const phase = phases[currentIndex];
      if (currentIndex !== phaseIndex) {
        phaseIndex = currentIndex;
        if (onPhase) onPhase(phase);
      }
      setStatus(statusNode, `Agent 执行中 · ${phase} · ${elapsed}s`);
      if (assistantNode) {
        const dots = ".".repeat((tick % 3) + 1);
        assistantNode.textContent = `思考中${dots}\n${phase} (${elapsed}s)`;
      }
    }, 1000);

    return () => {
      clearInterval(timer);
    };
  }

  sendBtn.addEventListener("click", async () => {
    const message = messageInput.value.trim();
    if (!message) {
      setStatus(statusEl, "请输入消息", "error");
      return;
    }

    const sessionId = (sessionIdInput.value || "").trim() || `agent-${Date.now()}`;
    if (!sessionIdInput.value.trim()) {
      sessionIdInput.value = sessionId;
    }
    activeSessionId = sessionId;
    localStorage.setItem(SESSION_STORAGE_KEY, sessionId);

    addMsg("user", message);
    const assistantNode = addMsg("assistant", "思考中...");
    const run = createRunRecord(message);
    run.line("请求已发送到 /chat/stream");
    const stopProgress = startAgentProgress(statusEl, assistantNode, (phase) => {
      run.line(`阶段: ${phase}`);
    });

    try {
      const payload = {
        sessionId,
        provider: providerSelect.value,
        mode: modeSelect.value,
        orchestrator: "agent",
        message
      };
      attachToolPolicyIntoPayload(payload);

      // SSE 流式请求
      const response = await fetch("/chat/stream", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload)
      });
      if (!response.ok) throw new Error(`HTTP ${response.status}`);

      const reader = response.body.getReader();
      const decoder = new TextDecoder();
      let buffer = "";
      let fullText = "";

      assistantNode.textContent = "";

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        buffer += decoder.decode(value, { stream: true });

        const lines = buffer.split("\n");
        buffer = lines.pop();

        for (const line of lines) {
          if (!line.startsWith("data:")) continue;
          const raw = line.slice(5).trim();
          if (!raw) continue;
          let event;
          try { event = JSON.parse(raw); } catch { continue; }

          if (event.type === "token") {
            fullText += event.text || "";
            assistantNode.textContent = fullText;
          } else if (event.type === "status") {
            setStatus(statusEl, event.msg || "处理中...");
            run.line(`状态: ${event.msg || ""}`);
          } else if (event.type === "tool_start") {
            setStatus(statusEl, `调用工具: ${event.name || ""}`);
            run.line(`工具开始: ${event.name || ""}`);
          } else if (event.type === "tool_done") {
            setStatus(statusEl, `工具完成: ${event.name || ""}`);
            run.line(`工具完成: ${event.name || ""}${event.text ? " → " + event.text.slice(0, 80) : ""}`);
          } else if (event.type === "done") {
            stopProgress();
            const data = event.data || {};
            assistantNode.textContent = fullText || data.answer || "";
            run.line(`协议: ${data.toolProtocolUsed ? "tool_calls" : "plain"}`);
            run.line(`工具: ${(data.toolCalls || []).join(", ") || "none"}`);
            if (payload.allowedTools && payload.allowedTools.length > 0) {
              run.line(`白名单: ${payload.allowedTools.join(", ")}`);
            }
            run.line(`联网: ${payload.internetEnabled !== false ? "enabled" : "disabled"}`);
            run.line(`回合: ${Number(data.toolRounds || 0)} · 延迟: ${((data.toolRoundLatenciesMs || []).join("/") || "-")}ms`);
            if ((data.toolErrors || []).length > 0) {
              run.line(`工具错误: ${(data.toolErrors || []).join(" | ")}`);
            }
            run.done("响应完成");

            metaEl.textContent = JSON.stringify({
              orchestratorUsed: data.orchestratorUsed,
              orchestratorReason: data.orchestratorReason,
              providerUsed: data.providerUsed,
              modeUsed: data.modeUsed,
              modeReason: data.modeReason,
              toolProtocolUsed: data.toolProtocolUsed,
              toolRounds: data.toolRounds,
              toolRoundLatenciesMs: data.toolRoundLatenciesMs,
              toolCalls: data.toolCalls,
              toolErrors: data.toolErrors
            }, null, 2);

            setStatus(statusEl, "请求成功", "ok");
            messageInput.value = "";
            persistToolPolicy();
            await loadSessionList();
          } else if (event.type === "error") {
            throw new Error(event.msg || "流式请求出错");
          }
        }
      }
    } catch (e) {
      assistantNode.textContent = "请求失败: " + e.message;
      setStatus(statusEl, e.message, "error");
      run.fail("请求失败: " + e.message);
    } finally {
      stopProgress();
    }
  });

  renderRunLog();

  sessionListEl.addEventListener("click", async (event) => {
    const btn = event.target.closest(".session-item");
    if (!btn) return;
    const sessionId = decodeURIComponent(btn.dataset.session || "");
    await switchSession(sessionId);
  });

  refreshSessionsBtn.addEventListener("click", async () => {
    await loadSessionList();
  });

  newSessionBtn.addEventListener("click", async () => {
    const sessionId = `agent-${Date.now()}`;
    await switchSession(sessionId);
    clearTimeline();
    addMsg("assistant", "新会话已创建，开始提问吧。");
  });

  sessionIdInput.addEventListener("change", async () => {
    const sessionId = sessionIdInput.value.trim();
    if (!sessionId) return;
    await switchSession(sessionId);
  });

  allowedToolsEl.addEventListener("change", () => {
    persistToolPolicy();
  });

  toolControlModeSelect.addEventListener("change", () => {
    persistToolPolicy();
  });

  internetEnabledInput.addEventListener("change", () => {
    persistToolPolicy();
  });

  manualCallBtn.addEventListener("click", async () => {
    const toolName = manualToolSelect.value;
    if (!toolName) {
      manualOutEl.textContent = "请选择工具";
      return;
    }
    let args = {};
    try {
      args = JSON.parse(manualArgsInput.value || "{}");
    } catch (e) {
      manualOutEl.textContent = "JSON 解析失败: " + e.message;
      return;
    }

    manualOutEl.textContent = "调用中...";
    try {
      const data = await api("/admin/mcp/call", {
        method: "POST",
        body: JSON.stringify({ name: toolName, arguments: args })
      });
      manualOutEl.textContent = data.output || "(empty)";
    } catch (e) {
      manualOutEl.textContent = "调用失败: " + e.message;
    }
  });

  async function init() {
    applyStoredToolPolicy();
    await loadToolMetadata();
    const storedSessionId = localStorage.getItem(SESSION_STORAGE_KEY);
    const initialSessionId = storedSessionId || sessionIdInput.value.trim() || `agent-${Date.now()}`;
    await switchSession(initialSessionId);
  }

  init();

  messageInput.addEventListener("keydown", (event) => {
    if (event.isComposing || event.keyCode === 229) {
      return;
    }
    if (event.key === "Enter" && !event.shiftKey) {
      event.preventDefault();
      sendBtn.click();
    }
  });
</script>
</body>
</html>
