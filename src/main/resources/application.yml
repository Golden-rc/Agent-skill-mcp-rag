server:
  port: 8080

spring:
  config:
    import: optional:file:.env[.properties]
  datasource:
    url: jdbc:postgresql://localhost:${POSTGRES_PORT:5432}/${POSTGRES_DB:agentdb}
    username: ${POSTGRES_USER:agent}
    password: ${POSTGRES_PASSWORD:agent}
  data:
    redis:
      host: localhost
      port: ${REDIS_PORT:6379}
  sql:
    init:
      mode: always
  servlet:
    multipart:
      max-file-size: 30MB
      max-request-size: 30MB

app:
  chat:
    orchestrator: ${CHAT_ORCHESTRATOR:classic}
    tool-calling-enabled: ${CHAT_TOOL_CALLING_ENABLED:true}
    tool-calling-openai-only: ${CHAT_TOOL_CALLING_OPENAI_ONLY:true}
    max-tool-rounds: ${CHAT_MAX_TOOL_ROUNDS:3}
  rag:
    embedding-provider: ${RAG_EMBED_PROVIDER:openai}
    embedding-model: ${RAG_EMBED_MODEL:embedding-2}
    embedding-dimension: ${RAG_EMBED_DIM:1024}
    chunk-size: ${RAG_CHUNK_SIZE:700}
    chunk-overlap: ${RAG_CHUNK_OVERLAP:120}
    chunk-min-size: ${RAG_CHUNK_MIN_SIZE:120}
    recall-top-k: ${RAG_RECALL_TOPK:20}
    final-top-k: ${RAG_FINAL_TOPK:5}
    min-score: ${RAG_MIN_SCORE:0.35}
    citation-max-chars: ${RAG_CITATION_MAX_CHARS:50}
    context-max-chars: ${RAG_CONTEXT_MAX_CHARS:2600}
    context-chunk-max-chars: ${RAG_CONTEXT_CHUNK_MAX_CHARS:700}
    min-evidence-count: ${RAG_MIN_EVIDENCE_COUNT:1}
  ollama:
    base-url: http://localhost:${OLLAMA_PORT:11434}
    chat-model: ${OLLAMA_CHAT_MODEL:qwen3:4b}
    embedding-model: ${OLLAMA_EMBED_MODEL:nomic-embed-text:latest}
  openai:
    base-url: ${OPENAI_BASE_URL:https://api.openai.com/v1}
    api-key: ${OPENAI_API_KEY:}
    chat-model: ${OPENAI_CHAT_MODEL:gpt-4o-mini}
  mcp:
    base-url: ${MCP_BASE_URL:http://localhost:8090}
  memory:
    max-history-messages: ${MEMORY_MAX_HISTORY_MESSAGES:50}
    history-ttl-hours: ${MEMORY_HISTORY_TTL_HOURS:168}
    direct-history-messages: ${MEMORY_DIRECT_HISTORY_MESSAGES:8}
